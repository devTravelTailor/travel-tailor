# ============================================================
# Travel Tailor — Nginx Production Config
# Apply on your GCP VM: sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# Redirect HTTP → HTTPS (all domains)
server {
    listen 80;
    server_name traveltailor.in www.traveltailor.in;
    return 301 https://traveltailor.in$request_uri;
}

# Redirect www HTTPS → non-www HTTPS
server {
    listen 443 ssl http2;
    server_name www.traveltailor.in;

    ssl_certificate     /etc/letsencrypt/live/traveltailor.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/traveltailor.in/privkey.pem;

    return 301 https://traveltailor.in$request_uri;
}

# Main HTTPS server — non-www canonical
server {
    listen 443 ssl http2;
    server_name traveltailor.in;

    ssl_certificate     /etc/letsencrypt/live/traveltailor.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/traveltailor.in/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Increase timeouts to prevent 5xx from slow API
    proxy_connect_timeout   60s;
    proxy_send_timeout      120s;
    proxy_read_timeout      120s;
    send_timeout            120s;

    # Buffer settings
    proxy_buffer_size       16k;
    proxy_buffers           8 16k;
    proxy_busy_buffers_size 32k;

    # Proxy to Next.js
    location / {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection 'upgrade';
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_cache_bypass  $http_upgrade;
    }

    # Serve uploaded/static files directly (bypass Node.js for speed)
    location /uploads/ {
        alias /var/www/traveltailor/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Logs — captures 5xx for debugging
    access_log  /var/log/nginx/traveltailor_access.log;
    error_log   /var/log/nginx/traveltailor_error.log warn;
}
